input_csv: dataset/data_sample_AofAI.csv
output_dir: dataset/silver

url_columns:
  website_url: official
  linkedin_url: social
  facebook_url: social
  instagram_url: social
  twitter_url: social
  youtube_url: social

crawl:
  max_concurrency: 3
  browser_recycle_every: 200
  timeout_ms: 60000
  seed_timeout_ms: 180000
  retry_count: 2
  cache_base_dir: dataset/silver/crawl4ai-cache
  deep_crawl_enabled: true
  deep_crawl_max_depth: 1
  deep_crawl_max_pages: 5
  deep_crawl_include_external: false

rules:
  add_threshold: 0.60
  replace_threshold: 0.80

validation_signals:
  enabled: true
  jsonld_country_confidence: 0.90
  tld_country_confidence: 0.85
  text_country_confidence: 0.65
  language_country_confidence: 0.55
  city_pattern_confidence: 0.60

country_validation:
  enabled: true
  vote_confidence_threshold: 0.75
  weak_locale_evidence_types:
    - html_lang
    - og_locale
    - language
  ignored_locale_tags:
    - en
    - en-US
    - en_US
    - english
  locale_requires_support: true

er_ready:
  city_confidence_threshold: 0.80
  email_confidence_threshold: 0.85
  description_confidence_threshold: 0.75
  year_founded_confidence_threshold: 0.80
  employee_count_confidence_threshold: 0.75

target_fields:
  - company_name
  - company_legal_names
  - company_commercial_names
  - main_country_code
  - main_country
  - main_region
  - main_city
  - main_postcode
  - main_street
  - primary_email
  - primary_phone
  - short_description
  - year_founded
  - employee_count
